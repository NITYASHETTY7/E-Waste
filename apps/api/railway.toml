[build]
builder = "NIXPACKS"
buildCommand = "PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true PUPPETEER_SKIP_DOWNLOAD=true npm install --include=dev && npm run build"

[deploy]
startCommand = "cd apps/api && npx prisma migrate deploy && node dist/main"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
