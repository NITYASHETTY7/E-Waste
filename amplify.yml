version: 1
applications:
  - appRoot: apps/api
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g @nestjs/cli
            - cd ../.. && npm install
        build:
          commands:
            - npx prisma generate --schema=apps/api/prisma/schema/config.prisma
            - cd apps/api && npm run build
      artifacts:
        baseDirectory: apps/api/dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*

  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - cd ../.. && npm install
            - cd packages/types && npm run build
            - cd ../../apps/web
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
